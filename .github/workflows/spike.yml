name: Spike — Strategy Optimizer

on:
  workflow_dispatch:
    inputs:
      hours:
        description: "Run duration in hours"
        required: false
        default: "5"
        type: string
      pop_size:
        description: "Population size per strategy per generation"
        required: false
        default: "60"
        type: string
      strategies:
        description: "Comma-separated strategy names to run (blank = all)"
        required: false
        default: ""
        type: string
      bayesian:
        description: "Use Bayesian optimization instead of GA"
        required: false
        default: "false"
        type: string

concurrency:
  group: spike
  cancel-in-progress: false

jobs:
  spike:
    runs-on: ubuntu-latest
    timeout-minutes: 330  # 5h hard cap + 30min buffer

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Ensure latest main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run optimizer
        run: |
          HOURS=${{ github.event.inputs.hours }}
          POP=${{ github.event.inputs.pop_size }}
          # Hard cap at 5 hours to stay within GH Actions free tier limit
          HOURS=$(python3 -c "print(min(float('$HOURS'), 5.0))")
          STRATS="${{ github.event.inputs.strategies }}"
          STRATS_FLAG=""
          if [ -n "$STRATS" ]; then
            STRATS_FLAG="--strategies $STRATS"
          fi
          BAYESIAN="${{ github.event.inputs.bayesian }}"
          BAYESIAN_FLAG=""
          if [ "$BAYESIAN" = "true" ]; then
            BAYESIAN_FLAG="--bayesian"
          fi
          python3 -u scripts/spike_runner.py \
            --hours "$HOURS" \
            --pop-size "$POP" \
            $STRATS_FLAG \
            $BAYESIAN_FLAG

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Only commit spike/ output files — never scripts/ or other code
          git add spike/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          # Find the latest run number from the directory names
          LATEST_RUN=$(ls -d spike/runs/[0-9]* 2>/dev/null | sort -t/ -k3 -n | tail -1 | xargs basename)
          git commit -m "spike: run ${LATEST_RUN:-???} ($(date +%Y-%m-%d))"
          # Fetch latest main and rebase our commit on top
          git fetch origin main
          if ! git rebase origin/main; then
            # If code changed on main during the run, accept main's version for
            # everything except spike/ (where we keep our results)
            git diff --name-only --diff-filter=U | while read -r f; do
              case "$f" in
                spike/*) git checkout --theirs -- "$f" ;;  # keep our run results
                *)       git checkout --ours -- "$f" ;;    # keep main's code changes
              esac
            done
            git add -A
            GIT_EDITOR=true git rebase --continue || {
              echo "::warning::Rebase failed — aborting and retrying with merge"
              git rebase --abort
              git pull --no-rebase origin main -X ours
            }
          fi
          git push
