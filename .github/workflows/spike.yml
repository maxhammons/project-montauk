name: Spike — Strategy Optimizer

on:
  workflow_dispatch:
    inputs:
      hours:
        description: "Run duration in hours"
        required: false
        default: "5"
        type: string
      pop_size:
        description: "Population size per strategy per generation"
        required: false
        default: "60"
        type: string

concurrency:
  group: spike
  cancel-in-progress: false

jobs:
  spike:
    runs-on: ubuntu-latest
    timeout-minutes: 330  # 5h hard cap + 30min buffer

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history so rebase always works

      - name: Ensure latest main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run optimizer
        run: |
          HOURS=${{ github.event.inputs.hours }}
          POP=${{ github.event.inputs.pop_size }}
          # Hard cap at 5 hours to stay within GH Actions free tier limit
          HOURS=$(python3 -c "print(min(float('$HOURS'), 5.0))")
          python3 -u scripts/spike_runner.py \
            --hours "$HOURS" \
            --pop-size "$POP"

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add spike/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "spike: automated run $(date +%Y-%m-%d)"
          # Fetch latest main and rebase our commit on top
          git fetch origin main
          if ! git rebase origin/main; then
            # Conflict in spike/ files — keep this run's results (during rebase, --theirs = our commit)
            git checkout --theirs -- spike/
            git add spike/
            GIT_EDITOR=true git rebase --continue
          fi
          git push
