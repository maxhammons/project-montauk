name: Spike — Strategy Optimizer

on:
  workflow_dispatch:
    inputs:
      hours:
        description: "Run duration (max 5)"
        required: false
        default: "5"
        type: string
      pop_size:
        description: "Population size per strategy per generation"
        required: false
        default: "40"
        type: string

jobs:
  spike:
    runs-on: ubuntu-latest
    timeout-minutes: 330  # 5.5h hard cap

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run optimizer
        run: |
          HOURS=${{ github.event.inputs.hours }}
          POP=${{ github.event.inputs.pop_size }}
          # Clamp hours to 5
          HOURS=$(python3 -c "print(min(float('$HOURS'), 5.0))")
          DATE=$(date +%Y-%m-%d)
          python3 -u scripts/evolve.py \
            --hours "$HOURS" \
            --pop-size "$POP" \
            2>&1 | tee remote/evolve-log-$DATE.txt

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add remote/
          git diff --cached --quiet || git commit -m "spike: automated run $(date +%Y-%m-%d)"
          git push
