<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Montauk</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <link rel="stylesheet" href="/src/viz/viz.css" />
  </head>
  <body>
    <div id="app">
      <main class="main">
        <header class="topbar">
          <div>
            <div class="eyebrow">Project Montauk</div>
            <h2 id="signal-title">--</h2>
            <div id="last-refreshed" class="muted compact">--</div>
          </div>
          <div class="actions">
            <button id="viz-popout-btn" class="button big-button">Open Viz</button>
            <button id="maintenance-btn" class="button primary big-button" data-tip="Refresh local data, recompute the current signal, update strategy artifacts, rebuild the viz bundle, and run health checks.">Refresh</button>
          </div>
        </header>

        <section id="action-error" class="action-error" hidden>
          <div>
            <strong id="action-error-title">Action failed</strong>
            <p id="action-error-body">--</p>
          </div>
          <button id="action-error-copy" class="button small">Copy Debug</button>
        </section>

        <section id="dashboard-view" class="view active">
          <section class="dashboard-grid">
            <div class="surface command-panel">
              <div class="panel-label">Position status</div>
              <div id="action-main" class="action-main">--</div>
              <div id="position-label" class="position-label">--</div>
            </div>

            <section class="surface doctor-hero">
              <div class="ledger">
                <div class="panel-label">How sure are we?</div>
                <div id="confidence-big" class="ledger-number">--</div>
                <div id="confidence-narrative" class="ledger-narrative">--</div>
              </div>
              <div id="ledger-pills" class="ledger-pills"></div>
            </section>

            <aside class="surface family-card">
              <div class="panel-label">Active family</div>
              <div id="champion-family" class="family-name">--</div>
              <div id="champion-name" class="muted">--</div>
              <div class="family-meta">
                <div data-tip="The latest market date included in the signal snapshot.">
                  <span>Data</span>
                  <strong id="data-end">--</strong>
                  <small id="freshness-state">--</small>
                </div>
              </div>
            </aside>

            <div class="surface meter-block health-card">
              <div class="meter-head">
                <span>TECL Health</span>
                <strong id="tecl-health-state">--</strong>
              </div>
              <canvas id="health-spark" class="sparkline tall" width="420" height="96"></canvas>
              <div id="tecl-health-meta" class="muted compact">--</div>
            </div>

            <div class="surface meter-block pressure-card">
              <div class="meter-head">
                <span>Flip pressure</span>
                <strong id="pressure-state">--</strong>
              </div>
              <canvas id="pressure-spark" class="sparkline tall" width="420" height="96"></canvas>
            </div>

            <section id="issue-panel" class="surface issue-panel" hidden>
              <div>
                <div class="panel-label">Issue code</div>
                <div id="issue-code" class="issue-code">--</div>
                <div id="issue-summary" class="muted compact">--</div>
              </div>
              <button id="issue-copy-btn" class="button small">Copy Debug</button>
            </section>
          </section>
        </section>
      </main>
    </div>

    <div id="maintenance-modal" class="maintenance-modal" hidden>
      <div class="maintenance-card">
        <div class="maintenance-eyebrow">Refreshing</div>
        <div id="maintenance-phase-title" class="maintenance-title">Updating Montauk</div>
        <div id="maintenance-phase-detail" class="maintenance-detail">—</div>
        <div id="maintenance-bar" class="maintenance-bar is-indeterminate"><div id="maintenance-bar-fill" class="maintenance-bar-fill"></div></div>
        <ol id="maintenance-steps" class="maintenance-steps"></ol>
        <div class="maintenance-actions">
          <button id="maintenance-close-btn" class="button" data-maintenance-close hidden>Close</button>
          <button id="maintenance-copy-btn" class="button small" hidden>Copy Debug</button>
        </div>
      </div>
    </div>

    <div id="tooltip-bubble" class="tooltip-bubble" role="tooltip" hidden></div>
    <script src="/lib/lightweight-charts.js"></script>
    <script src="/lib/viz-engine.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
